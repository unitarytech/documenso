version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: documenso-database
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-documenso}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-documenso}
    ports:
      - "54320:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-documenso} -d $${POSTGRES_DB:-documenso}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  documenso:
    image: documenso/documenso:latest
    container_name: documenso-app
    restart: always
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NEXT_PRIVATE_DATABASE_URL=postgres://${POSTGRES_USER:-documenso}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-documenso}
      - NEXT_PRIVATE_DIRECT_DATABASE_URL=postgres://${POSTGRES_USER:-documenso}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-documenso}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

volumes:
  db_data:
